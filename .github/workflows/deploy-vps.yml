name: Deploy to mitch-cloud

on:
  push:
    branches: [main]
    paths:
      - "video_processor/**"
      - "video_recall_project/**"
      - "core_requirements.txt"
      - "requirements-ci.txt"
      - "core_video_processor.py"
      - "whisper_compat.py"
      - "semantic_search.py"
      - "enhanced_semantic_search.py"
      - "Dockerfile.prod"
      - "docker-compose.prod.yml"
      - "startup.sh"
      - "deploy/**"
      - ".github/workflows/deploy-vps.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test:
    name: Pre-deploy tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run migrations and tests
        env:
          DJANGO_SETTINGS_MODULE: video_recall_project.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: |
          python manage.py migrate --noinput
          python manage.py test video_processor --verbosity=1

  deploy:
    name: Deploy recall-ai to mitch-cloud
    needs: test
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to mitch-cloud
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -e

          ssh ${VPS_USER}@${VPS_HOST} 'mkdir -p /opt/360ws/clients/docker-app/recall-ai'

          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'venv' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude 'media' \
            --exclude 'uploads' \
            --exclude 'downloads' \
            --exclude 'search_cache' \
            --exclude 'staticfiles' \
            --exclude 'node_modules' \
            --exclude 'test_data' \
            --exclude '*.bin' \
            --exclude '*.pkl' \
            --exclude '*.mp4' \
            --exclude '*.tar.gz' \
            --exclude '.video-processor*' \
            --exclude '*.pem' \
            --exclude 'db.sqlite3' \
            --exclude 'terraform' \
            --exclude 'task-definition*.json' \
            ./ ${VPS_USER}@${VPS_HOST}:/opt/360ws/clients/docker-app/recall-ai/

          ssh ${VPS_USER}@${VPS_HOST} << 'EOF'
            set -e
            cd /opt/360ws/clients/docker-app/recall-ai

            # Remove stale image archives that bloat build context
            rm -f .video-processor*.tar.gz* video-processor*.tar.gz db.sqlite3 2>/dev/null || true

            echo "Building and starting containers..."
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for app to be ready..."
            sleep 20

            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py migrate --noinput || \
            docker compose -f docker-compose.prod.yml run --rm app python manage.py migrate --noinput

            echo "Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py collectstatic --noinput || true

            echo "Health check..."
            max_attempts=30
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if curl -fsS http://localhost:8030/health/ > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              attempt=$((attempt + 1))
              echo "Health check attempt $attempt/$max_attempts failed, retrying..."
              sleep 5
            done

            if [ $attempt -eq $max_attempts ]; then
              echo "Health check failed after $max_attempts attempts."
              docker compose -f docker-compose.prod.yml logs app --tail=100
              exit 1
            fi

            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
            echo "Deployment successful!"
          EOF

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ recall-ai deployed successfully to mitch-cloud"}' \
            "$SLACK_WEBHOOK"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ recall-ai deployment to mitch-cloud failed"}' \
            "$SLACK_WEBHOOK"
