repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.9
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [--select=E9,F63,F7,F82]
  - repo: local
    hooks:
      - id: django-makemigrations-check
        name: django makemigrations --check
        entry: bash -c 'DJANGO_SETTINGS_MODULE=video_recall_project.settings SECRET_KEY=precommit-check python manage.py makemigrations --check --dry-run'
        language: system
        pass_filenames: false
        files: (models\.py|migrations/)
