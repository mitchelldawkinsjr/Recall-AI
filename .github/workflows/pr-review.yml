name: PR Review

on:
  pull_request:
    types: [opened]
  issues:
    types: [labeled]

jobs:
  resolve:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issues' && github.event.label.name == 'pr-opened')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      contents: read
    outputs:
      skip: ${{ steps.guards.outputs.skip }}
      issue_number: ${{ steps.guards.outputs.issue_number }}
      pr_number: ${{ steps.find_pr.outputs.pr_number }}
      pr_head_ref: ${{ steps.find_pr.outputs.pr_head_ref }}
      pr_url: ${{ steps.find_pr.outputs.pr_url }}

    steps:
      - name: Verify guards
        id: guards
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          ISSUE_FROM_EVENT: ${{ github.event.issue.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          ISSUE=""
          if [ "$EVENT" = "issues" ]; then
            ISSUE="$ISSUE_FROM_EVENT"
          else
            if [ -n "$PR_BODY" ]; then
              ISSUE=$(echo "$PR_BODY" | grep -oiE '(fixes|closes|resolves)[[:space:]]+#?[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
            fi
            if [ -z "$ISSUE" ] && [ -n "$PR_TITLE" ]; then
              ISSUE=$(echo "$PR_TITLE" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
            fi
          fi

          if [ -z "$ISSUE" ]; then
            echo "::notice::No linked issue. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "issue_number=$ISSUE" >> "$GITHUB_OUTPUT"

          LABELS=$(gh issue view "$ISSUE" --repo "$REPO" --json labels -q '[.labels[].name] | join(",")' 2>/dev/null || true)
          if [ -z "$LABELS" ]; then
            echo "::notice::Issue #${ISSUE} not found. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$LABELS" | grep -q 'review-dispatched'; then
            echo "::notice::Reviews already dispatched for issue #${ISSUE}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh label create pr-opened --description "Implementation PR opened" --color "1D76DB" 2>/dev/null || true
          gh label create review-dispatched --description "Bugbot + Ponytail reviews dispatched" --color "5319E7" 2>/dev/null || true
          gh label create review-running --description "Automated PR reviews in progress" --color "F9D0C4" 2>/dev/null || true
          gh label create review-clean --description "Automated reviews found no issues" --color "0E8A16" 2>/dev/null || true
          gh label create review-findings --description "Automated reviews reported findings" --color "D93F0B" 2>/dev/null || true

          gh issue edit "$ISSUE" --repo "$REPO" \
            --add-label review-dispatched \
            --add-label review-running

          if [ "$EVENT" = "pull_request" ] && echo "$LABELS" | grep -q 'agent-working'; then
            gh issue edit "$ISSUE" --repo "$REPO" \
              --remove-label agent-working \
              --add-label pr-opened
          fi

      - name: Resolve pull request
        id: find_pr
        if: steps.guards.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ steps.guards.outputs.issue_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          if [ "$EVENT" = "pull_request" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "pr_head_ref=$PR_HEAD" >> "$GITHUB_OUTPUT"
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "📬 **PR submitted** — [#${PR_NUMBER}](${PR_URL}) (draft). \`agent-working\` cleared; Bugbot + Ponytail running."
            exit 0
          fi

          PR_JSON=$(gh api "/repos/${REPO}/pulls?state=open&per_page=100" \
            --jq "[.[] | select(
              ((.body // \"\") | test(\"#[[:space:]]*${ISSUE_NUMBER}([^0-9]|$)\")) or
              ((.title // \"\") | test(\"#[[:space:]]*${ISSUE_NUMBER}([^0-9]|$)\"))
            )] | first")

          if [ "$PR_JSON" = "null" ] || [ -z "$PR_JSON" ]; then
            echo "::error::No open PR found linking to issue #${ISSUE_NUMBER}. Expected Fixes #${ISSUE_NUMBER} in the PR body."
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "PR review workflow could not find an open PR for this issue. Ensure the implementation PR body includes \`Fixes #${ISSUE_NUMBER}\`, then remove \`review-dispatched\` and re-add \`pr-opened\`."
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
              --remove-label review-running \
              --remove-label review-dispatched 2>/dev/null || true
            exit 1
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_HEAD=$(echo "$PR_JSON" | jq -r '.head.ref')
          PR_URL=$(echo "$PR_JSON" | jq -r '.html_url')

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_head_ref=$PR_HEAD" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "🔍 **Automated PR review started** for [#${PR_NUMBER}](${PR_URL}) — Bugbot + Ponytail running in parallel."

  bugbot:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      issues: write
      pull-requests: write
      contents: read
    outputs:
      has_findings: ${{ steps.review.outputs.has_findings }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CURSOR_API_KEY secret
        run: |
          if [ -z "${{ secrets.CURSOR_API_KEY }}" ]; then
            echo "::error::CURSOR_API_KEY secret is not configured."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Bugbot review
        id: review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REVIEW_TYPE: bugbot
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          PR_HEAD_REF: ${{ needs.resolve.outputs.pr_head_ref }}
          ISSUE_NUMBER: ${{ needs.resolve.outputs.issue_number }}
          REPO: ${{ github.repository }}
        run: node scripts/dispatch-pr-review.mjs

  ponytail:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      issues: write
      pull-requests: write
      contents: read
    outputs:
      has_findings: ${{ steps.review.outputs.has_findings }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CURSOR_API_KEY secret
        run: |
          if [ -z "${{ secrets.CURSOR_API_KEY }}" ]; then
            echo "::error::CURSOR_API_KEY secret is not configured."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Ponytail review
        id: review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          REVIEW_TYPE: ponytail
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          PR_HEAD_REF: ${{ needs.resolve.outputs.pr_head_ref }}
          ISSUE_NUMBER: ${{ needs.resolve.outputs.issue_number }}
          REPO: ${{ github.repository }}
        run: node scripts/dispatch-pr-review.mjs

  finalize:
    needs: [resolve, bugbot, ponytail]
    if: always() && needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Update issue review labels and mark PR ready
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.resolve.outputs.issue_number }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          REPO: ${{ github.repository }}
          PR_URL: ${{ needs.resolve.outputs.pr_url }}
          BUGBOT_RESULT: ${{ needs.bugbot.result }}
          PONYTAIL_RESULT: ${{ needs.ponytail.result }}
          BUGBOT: ${{ needs.bugbot.outputs.has_findings }}
          PONYTAIL: ${{ needs.ponytail.outputs.has_findings }}
        run: |
          set -euo pipefail

          if [ "$BUGBOT_RESULT" = "failure" ] || [ "$PONYTAIL_RESULT" = "failure" ] || [ "$BUGBOT" = "error" ] || [ "$PONYTAIL" = "error" ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --remove-label review-running
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "⚠️ Automated PR review **failed** for [the PR](${PR_URL}). Check the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). Remove \`review-dispatched\` and re-add \`pr-opened\` to retry."
            exit 1
          fi

          gh pr ready "$PR_NUMBER" --repo "$REPO"

          if [ "$BUGBOT" = "true" ] || [ "$PONYTAIL" = "true" ]; then
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
              --remove-label review-running \
              --add-label review-findings
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "📋 Automated review **complete** — findings on [the PR](${PR_URL}). PR marked ready for review; see Bugbot + Ponytail comments before merging."
          else
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" \
              --remove-label review-running \
              --add-label review-clean
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "✅ Automated review **complete** — no Bugbot bugs and lean Ponytail diff on [the PR](${PR_URL}). PR marked ready for your merge decision."
          fi
