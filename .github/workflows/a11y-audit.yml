name: Accessibility Audit

on:
  pull_request:
    paths:
      - 'video_processor/templates/**'
      - 'video_processor/static/**'
      - 'a11y-audit/**'
      - '.github/workflows/a11y-audit.yml'
  workflow_dispatch:

jobs:
  a11y:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: a11y-audit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: a11y-audit/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ..
        run: |
          python -m pip install --upgrade pip
          pip install django
          pip install -r requirements.txt 2>/dev/null || pip install django djangorestframework

      - name: Install audit dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start Django server
        working-directory: ..
        env:
          DJANGO_SETTINGS_MODULE: video_recall_project.settings
          SECRET_KEY: ci-a11y-secret
        run: |
          python manage.py migrate --run-syncdb
          python manage.py runserver 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/ && break
            sleep 2
          done

      - name: Run axe accessibility audit
        env:
          A11Y_BASE_URL: http://127.0.0.1:8000
        run: node audit.mjs --after

      - name: Run Playwright accessibility tests
        env:
          A11Y_BASE_URL: http://127.0.0.1:8000
        run: npx playwright test

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports
          path: |
            a11y-audit/summary-*.json
            a11y-audit/report-*.json
            a11y-audit/report-*.md
