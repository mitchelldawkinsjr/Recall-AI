name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Django Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: video_recall_project.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: python manage.py migrate --noinput

      - name: Check migrations are committed
        env:
          DJANGO_SETTINGS_MODULE: video_recall_project.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: video_recall_project.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: python manage.py test video_processor --verbosity=2

      - name: Django deployment check
        env:
          DJANGO_SETTINGS_MODULE: video_recall_project.settings.production
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1
          DATABASE_URL: sqlite:///ci_check.db
        run: python manage.py check --deploy

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: flake8 (critical errors only)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: black check
        run: |
          black --check video_processor/ video_recall_project/ \
            core_video_processor.py whisper_compat.py \
            semantic_search.py enhanced_semantic_search.py

      - name: isort check
        run: |
          isort --check-only video_processor/ video_recall_project/ \
            core_video_processor.py whisper_compat.py \
            semantic_search.py enhanced_semantic_search.py

  docker-build:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: recall-ai:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
