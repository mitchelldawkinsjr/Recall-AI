<div class="luminous-card rounded-xl p-md md:p-lg mb-xl flex flex-col md:flex-row md:items-center justify-between gap-md">
    <div class="flex items-center gap-md">
        <div class="w-14 h-14 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold text-lg shrink-0 border border-outline-variant/10">
            {{ target_user.username|slice:":2"|upper }}
        </div>
        <div>
            <h1 class="text-headline-lg text-primary">{{ target_user.username }}'s Library</h1>
            <p class="text-on-surface-variant text-body-md">Public video search and recall profile.</p>
        </div>
    </div>
    <div class="flex gap-sm flex-wrap">
        <a href="{% url 'public_user_search' username=username %}"
           class="px-md py-sm rounded-lg text-label-lg font-bold {% if request.resolver_match.url_name == 'public_user_search' %}bg-primary text-on-primary{% else %}border border-primary/20 text-primary hover:bg-primary/5{% endif %}">
            Search Hub
        </a>
        <a href="{% url 'public_user_enhanced_search' username=username %}"
           class="px-md py-sm rounded-lg text-label-lg font-bold {% if request.resolver_match.url_name == 'public_user_enhanced_search' %}bg-primary text-on-primary{% else %}border border-primary/20 text-primary hover:bg-primary/5{% endif %}">
            Enhanced Search
        </a>
    </div>
</div>
