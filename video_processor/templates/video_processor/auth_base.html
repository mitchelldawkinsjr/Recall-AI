<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recall AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    {% include "video_processor/includes/stitch_design.html" %}
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop text-on-surface">
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0" aria-hidden="true">
        <div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-primary-fixed opacity-10 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-secondary-container opacity-15 blur-[100px]"></div>
    </div>
    <main class="relative z-10 w-full max-w-[440px] flex-1 flex flex-col justify-center">
        {% block content %}{% endblock %}
    </main>
    <footer class="mt-auto py-md text-center relative z-10 w-full">
        <p class="text-label-md text-on-surface-variant">© {% now "Y" %} Recall AI. Precision Memory Architecture.</p>
    </footer>
</body>
</html>
