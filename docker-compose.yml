# AskMyVideo — local development compose (web only)
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=video_recall_project.settings
      - SECRET_KEY=dev-compose-secret
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
