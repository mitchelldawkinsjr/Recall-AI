<header class="sticky top-0 z-40 flex justify-between items-center h-16 px-margin-mobile md:px-margin-desktop bg-surface border-b border-outline-variant/10">
    <div class="flex items-center gap-md flex-1">
        <div class="lg:hidden flex items-center gap-xs text-primary font-bold">
            <span class="material-symbols-outlined">memory</span>
            Recall AI
        </div>
        {% block topbar_search %}
        <div class="relative w-full max-w-md hidden sm:block">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
            <input type="text"
                   class="w-full pl-10 pr-4 py-2 bg-surface-container-low border border-outline-variant/20 rounded-full focus:outline-none focus:border-primary transition-colors text-body-sm text-on-surface placeholder:text-outline"
                   placeholder="{% block search_placeholder %}Search your video library...{% endblock %}"
                   id="globalSearchInput"
                   {% block search_input_attrs %}{% endblock %}>
        </div>
        {% endblock %}
    </div>
    <div class="flex items-center gap-md">
        <button type="button" class="text-on-surface-variant hover:text-primary transition-colors hidden sm:block" title="Notifications">
            <span class="material-symbols-outlined">notifications</span>
        </button>
        <button type="button" class="text-on-surface-variant hover:text-primary transition-colors hidden sm:block" title="Settings">
            <span class="material-symbols-outlined">settings</span>
        </button>
        {% if user.is_authenticated %}
        <div class="w-9 h-9 rounded-full bg-primary-fixed border border-outline-variant/10 flex items-center justify-center text-primary font-bold text-sm overflow-hidden">
            {{ user.username|slice:":2"|upper }}
        </div>
        {% else %}
        <a href="{% url 'login' %}" class="text-label-lg text-primary hover:underline">Sign In</a>
        {% endif %}
    </div>
</header>
