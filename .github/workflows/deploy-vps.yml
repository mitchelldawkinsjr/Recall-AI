name: Deploy to mitch-cloud

on:
  push:
    branches: [main]
    paths:
      - "video_processor/**"
      - "video_recall_project/**"
      - "core_requirements.txt"
      - "requirements-ci.txt"
      - "core_video_processor.py"
      - "whisper_compat.py"
      - "semantic_search.py"
      - "enhanced_semantic_search.py"
      - "Dockerfile.prod"
      - "docker-compose.prod.yml"
      - "startup.sh"
      - "deploy/**"
      - ".github/workflows/deploy-vps.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test:
    name: Pre-deploy tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run migrations and tests
        env:
          DJANGO_SETTINGS_MODULE: video_recall_project.settings
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"
        run: |
          python manage.py migrate --noinput
          python manage.py test video_processor --verbosity=1

  deploy:
    name: Deploy recall-ai to mitch-cloud
    needs: test
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to mitch-cloud
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -e
          SSH_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=120"

          ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'mkdir -p /opt/360ws/clients/docker-app/recall-ai'

          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'venv' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude 'media' \
            --exclude 'uploads' \
            --exclude 'downloads' \
            --exclude 'search_cache' \
            --exclude 'staticfiles' \
            --exclude 'node_modules' \
            --exclude 'test_data' \
            --exclude '*.bin' \
            --exclude '*.pkl' \
            --exclude '*.mp4' \
            --exclude '*.tar.gz' \
            --exclude '.video-processor*' \
            --exclude '*.pem' \
            --exclude 'db.sqlite3' \
            --exclude 'terraform' \
            --exclude 'task-definition*.json' \
            ./ ${VPS_USER}@${VPS_HOST}:/opt/360ws/clients/docker-app/recall-ai/

          ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'chmod +x /opt/360ws/clients/docker-app/recall-ai/deploy/vps-deploy.sh'

          # Run build on VPS in background so long Docker builds survive SSH disconnects
          ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'nohup /opt/360ws/clients/docker-app/recall-ai/deploy/vps-deploy.sh > /tmp/recall-ai-deploy.log 2>&1 &'

          echo "Waiting for remote deploy (Docker build may take several minutes)..."
          max_wait=60
          attempt=0
          while [ $attempt -lt $max_wait ]; do
            if ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'grep -q DEPLOY_OK /tmp/recall-ai-deploy.log 2>/dev/null'; then
              ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'tail -20 /tmp/recall-ai-deploy.log'
              echo "Deployment successful!"
              exit 0
            fi
            if ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'grep -q DEPLOY_FAILED /tmp/recall-ai-deploy.log 2>/dev/null'; then
              ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'tail -100 /tmp/recall-ai-deploy.log'
              exit 1
            fi
            if ! ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'pgrep -f deploy/vps-deploy.sh >/dev/null 2>&1'; then
              if ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'test -f /tmp/recall-ai-deploy.log'; then
                ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'tail -100 /tmp/recall-ai-deploy.log'
              fi
              echo "Remote deploy script exited without success marker."
              exit 1
            fi
            attempt=$((attempt + 1))
            echo "Deploy in progress ($attempt/$max_wait)..."
            sleep 30
          done

          echo "Deploy timed out after $((max_wait * 30)) seconds."
          ssh $SSH_OPTS ${VPS_USER}@${VPS_HOST} 'tail -100 /tmp/recall-ai-deploy.log' || true
          exit 1

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"✅ recall-ai deployed successfully to mitch-cloud"}' \
            "$SLACK_WEBHOOK"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ recall-ai deployment to mitch-cloud failed"}' \
            "$SLACK_WEBHOOK"
