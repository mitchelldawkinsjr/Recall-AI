name: Deploy to mitch-cloud

on:
  push:
    branches: [main]
    paths:
      - "video_processor/**"
      - "video_recall_project/**"
      - "core_requirements.txt"
      - "Dockerfile.prod"
      - "docker-compose.prod.yml"
      - "startup.sh"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to mitch-cloud
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh ${VPS_USER}@${VPS_HOST} 'mkdir -p /opt/360ws/clients/docker-app/recall-ai'

          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'venv' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude 'media' \
            --exclude 'uploads' \
            --exclude 'downloads' \
            --exclude 'search_cache' \
            --exclude 'static' \
            --exclude 'staticfiles' \
            --exclude 'node_modules' \
            --exclude 'test_data' \
            --exclude '*.bin' \
            --exclude '*.pkl' \
            --exclude '*.mp4' \
            ./ ${VPS_USER}@${VPS_HOST}:/opt/360ws/clients/docker-app/recall-ai/

          ssh ${VPS_USER}@${VPS_HOST} << 'EOF'
            set -e
            cd /opt/360ws/clients/docker-app/recall-ai

            echo "Building and starting containers..."
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for app to be ready..."
            sleep 20

            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py migrate --noinput || \
            docker compose -f docker-compose.prod.yml run --rm app python manage.py migrate --noinput || true

            echo "Collecting static files..."
            docker compose -f docker-compose.prod.yml exec -T app python manage.py collectstatic --noinput || true

            echo "Health check..."
            for i in $(seq 1 10); do
              if curl -fsS http://localhost:8030/health/ > /dev/null 2>&1; then
                echo "App is healthy!"
                break
              fi
              echo "Waiting for health check ($i/10)..."
              sleep 10
            done

            docker compose -f docker-compose.prod.yml ps
          EOF
