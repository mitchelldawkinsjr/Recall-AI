{% extends "video_processor/search_interface.html" %}

{% block title %}Recall AI | {{ username }}'s Library{% endblock %}

{% block content %}
{% include "video_processor/includes/public_profile_header.html" %}
{{ block.super }}
{% endblock %}

{% block scripts %}
{{ block.super }}
<script>
const publicSearchUsername = '{{ username }}';
const _performSearch = performSearch;
performSearch = async function() {
    const query = document.getElementById('searchQuery').value.trim();
    if (!query) return;

    const searchButton = document.getElementById('searchButton');
    const resultsSection = document.getElementById('resultsSection');
    const resultsGrid = document.getElementById('resultsGrid');
    const resultsInfo = document.getElementById('resultsInfo');
    const modeBadge = document.getElementById('modeBadge');

    searchButton.disabled = true;
    searchButton.textContent = 'Searching...';
    resultsSection.classList.remove('hidden');
    resultsGrid.innerHTML = '<div class="luminous-card rounded-xl p-xl text-center text-on-surface-variant">Searching {{ username }}\'s videos...</div>';

    try {
        const response = await fetch('/api/search/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({ query, search_mode: currentMode, username: publicSearchUsername })
        });
        const data = await response.json();
        if (!data.success) throw new Error(data.error || 'Search failed');

        const count = data.count || data.total_results || 0;
        resultsInfo.textContent = `${count} results for "${data.query}"`;
        modeBadge.textContent = data.mode || data.search_mode;

        if (!data.results.length) {
            resultsGrid.innerHTML = '<div class="luminous-card rounded-xl p-xl text-center"><h3 class="text-headline-md text-primary mb-sm">No results found</h3><p class="text-on-surface-variant">Try different keywords or switch search modes.</p></div>';
        } else {
            resultsGrid.innerHTML = data.results.map(result => {
                const score = result.relevance_score ? Math.round(result.relevance_score * 100) : null;
                return `
                <div class="luminous-card rounded-xl overflow-hidden flex flex-col md:flex-row group hover:border-primary/20 transition-all p-md gap-md">
                    <div class="md:w-48 h-32 bg-surface-container rounded-lg flex items-center justify-center shrink-0 relative">
                        <span class="material-symbols-outlined text-primary text-[48px] opacity-40">play_circle</span>
                        ${score ? `<span class="absolute top-2 right-2 px-2 py-0.5 bg-primary text-on-primary text-label-md font-bold rounded">${score}% MATCH</span>` : ''}
                    </div>
                    <div class="flex-1 flex flex-col justify-between">
                        <div>
                            <h4 class="text-body-lg font-bold text-primary mb-xs">${result.video_name}</h4>
                            <p class="text-on-surface-variant text-body-sm line-clamp-2 italic border-l-2 border-outline-variant/30 pl-sm">${result.text}</p>
                        </div>
                        <div class="flex items-center justify-between mt-sm">
                            <button type="button" onclick="playSegment('${result.video_id}', ${result.start_time})"
                                    class="text-primary font-bold hover:underline flex items-center gap-xs">
                                <span class="material-symbols-outlined text-[18px]">play_arrow</span>
                                ${formatTime(result.start_time)}
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
    } catch (error) {
        resultsGrid.innerHTML = `<div class="rounded-xl p-md bg-error/10 text-error border border-error/20">${error.message}</div>`;
    } finally {
        searchButton.disabled = false;
        searchButton.textContent = 'Search';
    }
};
</script>
{% endblock %}
